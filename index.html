<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Досье</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a1a1a;
            color: #00ffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Scan lines effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT flicker */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 255, 0.03);
            animation: flicker 0.15s infinite;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border: 2px solid #00ffff;
            margin-bottom: 30px;
            background: rgba(0, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffff;
        }

        .btn {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .btn-danger {
            border-color: #ff0055;
            color: #ff0055;
        }

        .btn-danger:hover {
            background: rgba(255, 0, 85, 0.3);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        .btn-success {
            border-color: #00ff55;
            color: #00ff55;
        }

        .btn-success:hover {
            background: rgba(0, 255, 85, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 85, 0.5);
        }

        /* Dossier Grid */
        .dossier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .dossier-card {
            border: 2px solid #00ffff;
            padding: 20px;
            background: rgba(0, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .dossier-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #00ffff;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .dossier-card:hover::before {
            transform: scaleX(1);
        }

        .dossier-card:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        .dossier-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .dossier-card p {
            font-size: 12px;
            margin: 5px 0;
            opacity: 0.8;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border: 1px solid;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .status-alive {
            border-color: #00ff55;
            color: #00ff55;
        }

        .status-dead {
            border-color: #ff0055;
            color: #ff0055;
        }

        .status-missing {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .status-unknown {
            border-color: #888;
            color: #888;
        }

        /* Dossier View */
        .dossier-view {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .dossier-view {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            border: 2px solid #00ffff;
            padding: 20px;
            background: rgba(0, 255, 255, 0.05);
            position: relative;
        }

        .panel-title {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #0a1a1a;
            padding: 0 10px;
            font-size: 14px;
            text-transform: uppercase;
            color: #00ffff;
        }

        .avatar-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border: 3px solid #00ffff;
            object-fit: cover;
            image-rendering: pixelated;
            background: #000;
        }

        .avatar-placeholder {
            width: 200px;
            height: 200px;
            border: 3px solid #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 255, 0.1);
            font-size: 60px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .info-label {
            color: #00ffff;
            font-size: 14px;
        }

        .info-value {
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 5px;
        }

        .info-value:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .info-value[contenteditable="true"] {
            border: 1px dashed #00ffff;
            outline: none;
        }

        /* Progress Bar */
        .progress-container {
            margin: 15px 0;
        }

        .progress-label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .progress-bar {
            height: 20px;
            border: 2px solid #00ffff;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #00ff55);
            transition: width 0.5s;
        }

        /* Notes Section */
        .notes-section {
            margin-top: 20px;
        }

        .notes-list {
            list-style: none;
        }

        .notes-list li {
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #00ffff;
            background: rgba(0, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notes-list li button {
            background: none;
            border: none;
            color: #ff0055;
            cursor: pointer;
            font-size: 16px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* Navigation */
        .nav-back {
            margin-bottom: 20px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* File input styling */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #0a1a1a;
            border: 2px solid #00ffff;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #00ffff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Range slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(0, 255, 255, 0.2);
            border: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #00ffff;
            cursor: pointer;
            border: 2px solid #0a1a1a;
        }

        /* Glitch effect for title */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-1 0.3s infinite linear alternate-reverse;
            color: #ff0055;
            z-index: -1;
        }

        .glitch::after {
            animation: glitch-2 0.3s infinite linear alternate-reverse;
            color: #00ff55;
            z-index: -2;
        }

        @keyframes glitch-1 {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(80% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(20% 0 70% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(60% 0 30% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 60% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-2 {
            0% { clip-path: inset(70% 0 20% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(20% 0 70% 0); transform: translate(-2px, 1px); }
            40% { clip-path: inset(50% 0 40% 0); transform: translate(2px, 2px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translate(-2px, -2px); }
            80% { clip-path: inset(40% 0 50% 0); transform: translate(1px, 1px); }
            100% { clip-path: inset(80% 0 10% 0); transform: translate(-1px, -1px); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }

        .empty-state h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="glitch" data-text="СИСТЕМА ДОСЬЕ">СИСТЕМА ДОСЬЕ</h1>
            <button class="btn btn-success" onclick="showNewDossierForm()">+ Новое досье</button>
        </div>

        <!-- Main Content -->
        <div id="main-content">
            <!-- Dossier Grid (Home) -->
            <div id="dossier-grid" class="dossier-grid"></div>

            <!-- Single Dossier View -->
            <div id="dossier-view" class="hidden">
                <div class="nav-back">
                    <button class="btn" onclick="showHome()">← Назад к списку</button>
                </div>
                <div class="dossier-view">
                    <!-- Left Panel -->
                    <div class="panel">
                        <span class="panel-title">Профиль</span>
                        <div class="avatar-container">
                            <img id="view-avatar" class="avatar hidden" alt="Avatar">
                            <div id="view-avatar-placeholder" class="avatar-placeholder">👤</div>
                            <div style="margin-top: 15px;">
                                <div class="file-input-wrapper">
                                    <button class="btn">📷 Загрузить фото</button>
                                    <input type="file" id="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">
                                </div>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Номер:</span>
                            <span class="info-value" id="view-number" contenteditable="true" onblur="updateField('number', this.textContent)"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Имя:</span>
                            <span class="info-value" id="view-name" contenteditable="true" onblur="updateField('name', this.textContent)"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Кодовое имя:</span>
                            <span class="info-value" id="view-codename" contenteditable="true" onblur="updateField('codename', this.textContent)"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Статус:</span>
                            <span class="info-value" id="view-status" contenteditable="true" onblur="updateField('status', this.textContent)"></span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-label">Отношение: <span id="view-attitude-percent">50</span>%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="view-attitude-bar" style="width: 50%"></div>
                            </div>
                            <input type="range" id="view-attitude-slider" min="0" max="100" value="50" oninput="updateAttitude(this.value)" style="margin-top: 10px;">
                        </div>
                        <div class="info-row">
                            <span class="info-label">Создано:</span>
                            <span class="info-value" id="view-created"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Обновлено:</span>
                            <span class="info-value" id="view-updated"></span>
                        </div>
                        <div class="form-actions">
                            <button class="btn btn-danger" onclick="deleteCurrentDossier()">🗑️ Удалить</button>
                            <button class="btn" onclick="editFullDossier()">✏️ Редактировать всё</button>
                        </div>
                    </div>

                    <!-- Right Panel -->
                    <div class="panel">
                        <span class="panel-title">Данные</span>
                        <div class="form-group">
                            <label>Алгоритм / Деятельность</label>
                            <div class="info-value" id="view-algorithm" contenteditable="true" onblur="updateField('algorithm', this.textContent)" style="min-height: 30px; border: none; padding: 10px; background: rgba(0,255,255,0.05);"></div>
                        </div>
                        <div class="form-group">
                            <label>Опасения <button class="btn" onclick="addNote()" style="padding: 2px 8px; font-size: 12px;">+ Добавить</button></label>
                            <ul class="notes-list" id="view-notes"></ul>
                        </div>
                        <div class="form-group">
                            <label>Заметки</label>
                            <div class="info-value" id="view-notes-full" contenteditable="true" onblur="updateField('notes', this.innerHTML)" style="min-height: 100px; border: none; padding: 10px; background: rgba(0,255,255,0.05); white-space: pre-wrap;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New/Edit Dossier Modal -->
    <div id="dossier-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Новое досье</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="dossier-form" onsubmit="saveDossier(event)">
                <input type="hidden" id="form-id">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="form-name" required>
                </div>
                <div class="form-group">
                    <label>Номер досье</label>
                    <input type="text" id="form-number" placeholder="???">
                </div>
                <div class="form-group">
                    <label>Кодовое имя</label>
                    <input type="text" id="form-codename" placeholder="нет">
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="form-status">
                        <option value="жив">Жив</option>
                        <option value="мёртв">Мёртв</option>
                        <option value="пропал">Пропал</option>
                        <option value="неизвестно">Неизвестно</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Отношение: <span id="form-attitude-value">50</span>%</label>
                    <input type="range" id="form-attitude" min="0" max="100" value="50" oninput="document.getElementById('form-attitude-value').textContent = this.value">
                </div>
                <div class="form-group">
                    <label>Алгоритм / Деятельность</label>
                    <textarea id="form-algorithm" placeholder="Описание деятельности..."></textarea>
                </div>
                <div class="form-group">
                    <label>Опасения (каждое с новой строки)</label>
                    <textarea id="form-notes" placeholder="Список опасений..."></textarea>
                </div>
                <div class="form-group">
                    <label>Заметки</label>
                    <textarea id="form-notes-full" placeholder="Дополнительные заметки..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">💾 Сохранить</button>
                    <button type="button" class="btn" onclick="closeModal()">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize data
        let dossiers = [];
        let currentDossierId = null;

        // Load from localStorage
        function loadData() {
            const stored = localStorage.getItem('dossiers');
            if (stored) {
                dossiers = JSON.parse(stored);
            } else {
                // Default example dossier
                dossiers = [{
                    id: Date.now(),
                    name: 'Мартин',
                    number: '???',
                    codename: 'нет',
                    status: 'жив',
                    attitude: 50,
                    algorithm: 'очищение водосточной трубы',
                    notes: ['Боится, что его сотрёт Империя', 'Делится непроверенными данными'],
                    notesFull: '',
                    avatar: null,
                    created: new Date().toLocaleString('ru-RU'),
                    updated: new Date().toLocaleString('ru-RU')
                }];
                saveData();
            }
            renderGrid();
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('dossiers', JSON.stringify(dossiers));
        }

        // Render dossier grid
        function renderGrid() {
            const grid = document.getElementById('dossier-grid');
            if (dossiers.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>Нет досье</h2><p>Создайте первое досье</p></div>';
                return;
            }
            grid.innerHTML = dossiers.map(d => {
                const statusClass = d.status === 'жив' ? 'status-alive' : d.status === 'мёртв' ? 'status-dead' : d.status === 'пропал' ? 'status-missing' : 'status-unknown';
                return '<div class="dossier-card" onclick="viewDossier(' + d.id + ')">' +
                    '<h3>' + (d.name || 'Без имени') + '</h3>' +
                    '<p>Номер: ' + (d.number || '???') + '</p>' +
                    '<p>Кодовое имя: ' + (d.codename || 'нет') + '</p>' +
                    '<span class="status-badge ' + statusClass + '">' + d.status + '</span>' +
                    '</div>';
            }).join('');
        }

        // View single dossier
        function viewDossier(id) {
            const dossier = dossiers.find(d => d.id === id);
            if (!dossier) return;
            currentDossierId = id;

            document.getElementById('dossier-grid').classList.add('hidden');
            document.getElementById('dossier-view').classList.remove('hidden');

            // Avatar
            const avatarImg = document.getElementById('view-avatar');
            const avatarPlaceholder = document.getElementById('view-avatar-placeholder');
            if (dossier.avatar) {
                avatarImg.src = dossier.avatar;
                avatarImg.classList.remove('hidden');
                avatarPlaceholder.classList.add('hidden');
            } else {
                avatarImg.classList.add('hidden');
                avatarPlaceholder.classList.remove('hidden');
            }

            // Info
            document.getElementById('view-number').textContent = dossier.number || '???';
            document.getElementById('view-name').textContent = dossier.name || 'Без имени';
            document.getElementById('view-codename').textContent = dossier.codename || 'нет';
            document.getElementById('view-status').textContent = dossier.status;
            document.getElementById('view-algorithm').textContent = dossier.algorithm || '';
            document.getElementById('view-notes-full').innerHTML = dossier.notesFull || '';

            // Attitude
            document.getElementById('view-attitude-percent').textContent = dossier.attitude;
            document.getElementById('view-attitude-bar').style.width = dossier.attitude + '%';
            document.getElementById('view-attitude-slider').value = dossier.attitude;

            // Dates
            document.getElementById('view-created').textContent = dossier.created;
            document.getElementById('view-updated').textContent = dossier.updated;

            // Notes
            renderNotes(dossier.notes);
        }

        // Render notes list
        function renderNotes(notes) {
            const list = document.getElementById('view-notes');
            if (!notes || notes.length === 0) {
                list.innerHTML = '<li style="opacity: 0.5;">Нет опасений</li>';
                return;
            }
            list.innerHTML = notes.map((note, index) => 
                '<li><span>' + note + '</span><button onclick="removeNote(' + index + ')">×</button></li>'
            ).join('');
        }

        // Update field
        function updateField(field, value) {
            const dossier = dossiers.find(d => d.id === currentDossierId);
            if (!dossier) return;
            dossier[field] = value;
            dossier.updated = new Date().toLocaleString('ru-RU');
            saveData();
            renderGrid();
        }

        // Update attitude
        function updateAttitude(value) {
            const dossier = dossiers.find(d => d.id === currentDossierId);
            if (!dossier) return;
            dossier.attitude = parseInt(value);
            dossier.updated = new Date().toLocaleString('ru-RU');
            document.getElementById('view-attitude-percent').textContent = value;
            document.getElementById('view-attitude-bar').style.width = value + '%';
            saveData();
            renderGrid();
        }

        // Add note
        function addNote() {
            const note = prompt('Введите опасение:');
            if (!note) return;
            const dossier = dossiers.find(d => d.id === currentDossierId);
            if (!dossier) return;
            if (!dossier.notes) dossier.notes = [];
            dossier.notes.push(note);
            dossier.updated = new Date().toLocaleString('ru-RU');
            saveData();
            renderNotes(dossier.notes);
            renderGrid();
        }

        // Remove note
        function removeNote(index) {
            const dossier = dossiers.find(d => d.id === currentDossierId);
            if (!dossier) return;
            dossier.notes.splice(index, 1);
            dossier.updated = new Date().toLocaleString('ru-RU');
            saveData();
            renderNotes(dossier.notes);
            renderGrid();
        }

        // Handle avatar upload
        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dossier = dossiers.find(d => d.id === currentDossierId);
                if (!dossier) return;
                dossier.avatar = e.target.result;
                dossier.updated = new Date().toLocaleString('ru-RU');
                saveData();
                viewDossier(currentDossierId);
            };
            reader.readAsDataURL(file);
        }

        // Show home
        function showHome() {
            document.getElementById('dossier-view').classList.add('hidden');
            document.getElementById('dossier-grid').classList.remove('hidden');
            currentDossierId = null;
        }

        // Show new dossier form
        function showNewDossierForm() {
            document.getElementById('modal-title').textContent = 'Новое досье';
            document.getElementById('dossier-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('dossier-modal').classList.remove('hidden');
        }

        // Edit full dossier
        function editFullDossier() {
            const dossier = dossiers.find(d => d.id === currentDossierId);
            if (!dossier) return;
            document.getElementById('modal-title').textContent = 'Редактировать досье';
            document.getElementById('form-id').value = dossier.id;
            document.getElementById('form-name').value = dossier.name || '';
            document.getElementById('form-number').value = dossier.number || '';
            document.getElementById('form-codename').value = dossier.codename || '';
            document.getElementById('form-status').value = dossier.status || 'жив';
            document.getElementById('form-attitude').value = dossier.attitude || 50;
            document.getElementById('form-attitude-value').textContent = dossier.attitude || 50;
            document.getElementById('form-algorithm').value = dossier.algorithm || '';
            document.getElementById('form-notes').value = (dossier.notes || []).join('\n');
            document.getElementById('form-notes-full').value = dossier.notesFull || '';
            document.getElementById('dossier-modal').classList.remove('hidden');
        }

        // Close modal
        function closeModal() {
            document.getElementById('dossier-modal').classList.add('hidden');
        }

        // Save dossier
        function saveDossier(event) {
            event.preventDefault();
            const id = document.getElementById('form-id').value;
            const notesText = document.getElementById('form-notes').value;
            const notes = notesText ? notesText.split('\n').filter(n => n.trim()) : [];

            if (id) {
                // Edit existing
                const dossier = dossiers.find(d => d.id === parseInt(id));
                if (dossier) {
                    dossier.name = document.getElementById('form-name').value;
                    dossier.number = document.getElementById('form-number').value;
                    dossier.codename = document.getElementById('form-codename').value;
                    dossier.status = document.getElementById('form-status').value;
                    dossier.attitude = parseInt(document.getElementById('form-attitude').value);
                    dossier.algorithm = document.getElementById('form-algorithm').value;
                    dossier.notes = notes;
                    dossier.notesFull = document.getElementById('form-notes-full').value;
                    dossier.updated = new Date().toLocaleString('ru-RU');
                }
            } else {
                // Create new
                const newDossier = {
                    id: Date.now(),
                    name: document.getElementById('form-name').value,
                    number: document.getElementById('form-number').value,
                    codename: document.getElementById('form-codename').value,
                    status: document.getElementById('form-status').value,
                    attitude: parseInt(document.getElementById('form-attitude').value),
                    algorithm: document.getElementById('form-algorithm').value,
                    notes: notes,
                    notesFull: document.getElementById('form-notes-full').value,
                    avatar: null,
                    created: new Date().toLocaleString('ru-RU'),
                    updated: new Date().toLocaleString('ru-RU')
                };
                dossiers.push(newDossier);
            }
            saveData();
            closeModal();
            renderGrid();
            if (id) {
                viewDossier(parseInt(id));
            }
        }

        // Delete current dossier
        function deleteCurrentDossier() {
            if (!confirm('Удалить это досье?')) return;
            dossiers = dossiers.filter(d => d.id !== currentDossierId);
            saveData();
            showHome();
            renderGrid();
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
