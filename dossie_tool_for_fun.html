<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Досье</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'CyberFont';
            src: local('Courier New'), local('Consolas'), monospace;
        }

        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff41;
            --dark-bg: #0a0f14;
            --panel-bg: rgba(0, 30, 40, 0.85);
            --border-color: #00f0ff;
        }

        body {
            font-family: 'Courier New', 'Consolas', monospace;
            background: var(--dark-bg);
            color: var(--neon-blue);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Scan lines effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT flicker */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0, 0, 0, 0.3) 100%
            );
            pointer-events: none;
            z-index: 999;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px var(--neon-blue); }
            92% { text-shadow: 0 0 10px var(--neon-blue); }
            93% { text-shadow: 2px 0 10px #ff0000, -2px 0 10px #0000ff; }
            94% { text-shadow: 0 0 10px var(--neon-blue); }
        }

        .btn {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--neon-blue);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .btn:hover {
            background: var(--border-color);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:hover {
            background: #ff4444;
            color: white;
            box-shadow: 0 0 20px #ff4444;
        }

        .btn-success {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .btn-success:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* Dossier Grid */
        .dossier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .dossier-card {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            background: var(--panel-bg);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .dossier-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
        }

        .dossier-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
        }

        .dossier-card .avatar {
            width: 100px;
            height: 100px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            object-fit: cover;
            margin-bottom: 15px;
            background: rgba(0, 240, 255, 0.1);
        }

        .dossier-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .dossier-card .info {
            font-size: 12px;
            line-height: 1.8;
            opacity: 0.8;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .status-alive {
            background: rgba(0, 255, 65, 0.2);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }

        .status-dead {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .status-missing {
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid orange;
            color: orange;
        }

        .status-unknown {
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid gray;
            color: gray;
        }

        /* Dossier View */
        .dossier-view {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .dossier-view {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            background: var(--panel-bg);
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .avatar-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar-large {
            width: 250px;
            height: 250px;
            border: 3px solid var(--border-color);
            border-radius: 10px;
            object-fit: cover;
            background: rgba(0, 240, 255, 0.1);
            margin-bottom: 15px;
        }

        .field {
            margin-bottom: 15px;
        }

        .field-label {
            font-size: 12px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .field-value {
            font-size: 16px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: rgba(0, 240, 255, 0.05);
            min-height: 40px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .field-value:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-green);
        }

        .field-value[contenteditable="true"]:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        /* Progress Bar */
        .progress-container {
            margin: 10px 0;
        }

        .progress-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .progress-text {
            font-size: 12px;
            margin-top: 5px;
            text-align: right;
        }

        /* List Items */
        .list-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            margin-bottom: 8px;
            background: rgba(0, 240, 255, 0.05);
        }

        .list-item-text {
            flex: 1;
            font-size: 14px;
        }

        .list-item-delete {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
            margin-left: 10px;
        }

        .list-item-delete:hover {
            background: #ff4444;
            color: white;
        }

        .add-item-form {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-item-input {
            flex: 1;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--neon-blue);
            padding: 8px 12px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 5px;
        }

        .add-item-input::placeholder {
            color: rgba(0, 240, 255, 0.5);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
            display: block;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--neon-blue);
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 5px;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* File Input */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* Navigation */
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 14px;
        }

        .nav-back:hover {
            color: var(--neon-green);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: var(--dark-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.3);
        }

        .modal-title {
            font-size: 20px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Range Input */
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--neon-blue);
            cursor: pointer;
            border-radius: 50%;
            margin-top: -8px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }

        .empty-state h2 {
            margin-bottom: 10px;
        }

        /* Timestamps */
        .timestamps {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        /* Select dropdown styling */
        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: var(--dark-bg);
            color: var(--neon-blue);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>⬡ Система Досье</h1>
            <button class="btn" onclick="showDashboard()"> Главная</button>
        </header>

        <!-- Dashboard View -->
        <div id="dashboard-view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 18px; text-transform: uppercase;">Досье в базе</h2>
                <button class="btn btn-success" onclick="openNewDossierModal()">+ Новое досье</button>
            </div>
            <div id="dossier-grid" class="dossier-grid"></div>
            <div id="empty-state" class="empty-state hidden">
                <h2>Нет досье в базе</h2>
                <p>Создайте первое досье, нажав на кнопку выше</p>
            </div>
        </div>

        <!-- Dossier View -->
        <div id="dossier-view" class="hidden">
            <a href="#" class="nav-back" onclick="showDashboard(); return false;">← Назад к списку</a>
            
            <div class="dossier-view">
                <!-- Left Column -->
                <div>
                    <div class="panel">
                        <div class="avatar-container">
                            <img id="dv-avatar" class="avatar-large" src="" alt="Аватар">
                            <div class="file-input-wrapper">
                                <button class="btn">📷 Загрузить фото</button>
                                <input type="file" accept="image/*" onchange="uploadAvatar(event)">
                            </div>
                        </div>
                        
                        <div class="field">
                            <div class="field-label">Имя</div>
                            <div class="field-value" id="dv-name" contenteditable="true" onblur="saveField('name', this.textContent)"></div>
                        </div>
                        
                        <div class="field">
                            <div class="field-label">Номер досье</div>
                            <div class="field-value" id="dv-number" contenteditable="true" onblur="saveField('number', this.textContent)"></div>
                        </div>
                        
                        <div class="field">
                            <div class="field-label">Кодовое имя</div>
                            <div class="field-value" id="dv-codename" contenteditable="true" onblur="saveField('codename', this.textContent)"></div>
                        </div>
                        
                        <div class="field">
                            <div class="field-label">Статус</div>
                            <select class="form-select" id="dv-status" onchange="saveField('status', this.value)">
                                <option value="alive">Жив</option>
                                <option value="dead">Мёртв</option>
                                <option value="missing">Пропал</option>
                                <option value="unknown">Неизвестно</option>
                            </select>
                        </div>
                        
                        <div class="field">
                            <div class="field-label">Отношение</div>
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="dv-relation-bar" style="width: 50%"></div>
                                </div>
                                <div class="progress-text"><span id="dv-relation-text">50</span>%</div>
                            </div>
                            <input type="range" id="dv-relation" min="0" max="100" value="50" oninput="updateRelationBar(this.value)" onchange="saveField('relation', this.value)">
                        </div>
                    </div>
                </div>
                
                <!-- Right Column -->
                <div>
                    <div class="panel">
                        <div class="panel-title">
                            <span> Алгоритм / Деятельность</span>
                        </div>
                        <div class="field-value" id="dv-algorithm" contenteditable="true" onblur="saveField('algorithm', this.textContent)" style="min-height: 60px;"></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-title">
                            <span>️ Опасения</span>
                            <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="addConcern()">+ Добавить</button>
                        </div>
                        <div id="dv-concerns"></div>
                    </div>
                    
                    <div class="panel">
                        <div class="panel-title">
                            <span>📝 Заметки</span>
                        </div>
                        <div class="field-value" id="dv-notes" contenteditable="true" onblur="saveField('notes', this.textContent)" style="min-height: 150px;"></div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-danger" onclick="deleteCurrentDossier()">️ Удалить досье</button>
                    </div>
                    
                    <div class="timestamps">
                        <div>Создано: <span id="dv-created"></span></div>
                        <div>Обновлено: <span id="dv-updated"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Dossier Modal -->
    <div id="new-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2 class="modal-title">Новое досье</h2>
            <form id="new-form" onsubmit="createDossier(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Имя *</label>
                        <input type="text" class="form-input" id="new-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Номер досье</label>
                        <input type="text" class="form-input" id="new-number" placeholder="???">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Кодовое имя</label>
                        <input type="text" class="form-input" id="new-codename">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Статус</label>
                        <select class="form-select" id="new-status">
                            <option value="alive">Жив</option>
                            <option value="dead">Мёртв</option>
                            <option value="missing">Пропал</option>
                            <option value="unknown">Неизвестно</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">URL аватара (необязательно)</label>
                    <input type="text" class="form-input" id="new-avatar" placeholder="https://...">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Алгоритм / Деятельность</label>
                    <textarea class="form-textarea" id="new-algorithm"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Отношение</label>
                    <input type="range" id="new-relation" min="0" max="100" value="50" style="width: 100%;">
                    <div style="text-align: right; font-size: 12px; margin-top: 5px;"><span id="new-relation-text">50</span>%</div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeNewModal()">Отмена</button>
                    <button type="submit" class="btn btn-success">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Storage helpers with error handling
        function safeGetItem(key) {
            try {
                return localStorage.getItem(key);
            } catch (e) {
                console.warn('LocalStorage не доступен:', e);
                return null;
            }
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                console.warn('Не удалось сохранить в LocalStorage:', e);
                alert('Внимание: Данные не могут быть сохранены. Возможно, включён режим инкогнито или заблокированы куки.');
                return false;
            }
        }

        // Data management
        let dossiers = [];
        let currentDossierId = null;

        function loadDossiers() {
            const data = safeGetItem('dossiers');
            if (data) {
                dossiers = JSON.parse(data);
            } else {
                // Default example dossier
                dossiers = [{
                    id: Date.now().toString(),
                    name: 'Мартин',
                    number: '???',
                    codename: 'нет',
                    status: 'alive',
                    relation: 50,
                    avatar: '',
                    algorithm: 'очищение водосточной трубы',
                    concerns: [
                        'Боится, что его сотрёт Империя',
                        'Делится непроверенными данными'
                    ],
                    notes: '',
                    created: new Date().toLocaleString('ru-RU'),
                    updated: new Date().toLocaleString('ru-RU')
                }];
                saveDossiers();
            }
        }

        function saveDossiers() {
            safeSetItem('dossiers', JSON.stringify(dossiers));
        }

        function getCurrentDossier() {
            return dossiers.find(d => d.id === currentDossierId);
        }

        function saveCurrentDossier() {
            const dossier = getCurrentDossier();
            if (dossier) {
                dossier.updated = new Date().toLocaleString('ru-RU');
                saveDossiers();
            }
        }

        // View functions
        function showDashboard() {
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('dossier-view').classList.add('hidden');
            renderDashboard();
        }

        function showDossier(id) {
            currentDossierId = id;
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('dossier-view').classList.remove('hidden');
            renderDossier();
        }

        function renderDashboard() {
            const grid = document.getElementById('dossier-grid');
            const emptyState = document.getElementById('empty-state');

            if (dossiers.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = dossiers.map(d => `
                <div class="dossier-card" onclick="showDossier('${d.id}')">
                    <img class="avatar" src="${d.avatar || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23001828%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%2300f0ff%22 font-size=%2240%22>?</text></svg>'}" alt="${d.name}">
                    <h3>${d.name}</h3>
                    <div class="info">
                        <div>Номер: ${d.number || '???'}</div>
                        <div>Кодовое имя: ${d.codename || 'нет'}</div>
                        <div>Отношение: ${d.relation}%</div>
                    </div>
                    <span class="status-badge status-${d.status}">${getStatusText(d.status)}</span>
                </div>
            `).join('');
        }

        function renderDossier() {
            const d = getCurrentDossier();
            if (!d) return;

            document.getElementById('dv-avatar').src = d.avatar || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 250 250%22><rect fill=%22%23001828%22 width=%22250%22 height=%22250%22/><text x=%22125%22 y=%22135%22 text-anchor=%22middle%22 fill=%22%2300f0ff%22 font-size=%22100%22>?</text></svg>';
            document.getElementById('dv-name').textContent = d.name;
            document.getElementById('dv-number').textContent = d.number || '???';
            document.getElementById('dv-codename').textContent = d.codename || 'нет';
            document.getElementById('dv-status').value = d.status;
            document.getElementById('dv-relation').value = d.relation;
            document.getElementById('dv-algorithm').textContent = d.algorithm || '';
            document.getElementById('dv-notes').textContent = d.notes || '';
            document.getElementById('dv-created').textContent = d.created;
            document.getElementById('dv-updated').textContent = d.updated;

            updateRelationBar(d.relation);
            renderConcerns();
        }

        function renderConcerns() {
            const d = getCurrentDossier();
            if (!d) return;

            const container = document.getElementById('dv-concerns');
            if (!d.concerns || d.concerns.length === 0) {
                container.innerHTML = '<div style="opacity: 0.5; font-style: italic;">Нет опасений</div>';
                return;
            }

            container.innerHTML = d.concerns.map((c, i) => `
                <div class="list-item">
                    <span class="list-item-text">${c}</span>
                    <button class="list-item-delete" onclick="deleteConcern(${i})">✕</button>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const statuses = {
                alive: 'Жив',
                dead: 'Мёртв',
                missing: 'Пропал',
                unknown: 'Неизвестно'
            };
            return statuses[status] || status;
        }

        // Edit functions
        function saveField(field, value) {
            const d = getCurrentDossier();
            if (d) {
                d[field] = value;
                saveCurrentDossier();
                renderDashboard();
            }
        }

        function updateRelationBar(value) {
            document.getElementById('dv-relation-bar').style.width = value + '%';
            document.getElementById('dv-relation-text').textContent = value;
        }

        function addConcern() {
            const text = prompt('Введите опасение:');
            if (text && text.trim()) {
                const d = getCurrentDossier();
                if (d) {
                    if (!d.concerns) d.concerns = [];
                    d.concerns.push(text.trim());
                    saveCurrentDossier();
                    renderConcerns();
                }
            }
        }

        function deleteConcern(index) {
            const d = getCurrentDossier();
            if (d && d.concerns) {
                d.concerns.splice(index, 1);
                saveCurrentDossier();
                renderConcerns();
            }
        }

        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const d = getCurrentDossier();
                if (d) {
                    d.avatar = e.target.result;
                    saveCurrentDossier();
                    document.getElementById('dv-avatar').src = d.avatar;
                    renderDashboard();
                }
            };
            reader.readAsDataURL(file);
        }

        function deleteCurrentDossier() {
            if (confirm('Вы уверены, что хотите удалить это досье? Это действие нельзя отменить.')) {
                dossiers = dossiers.filter(d => d.id !== currentDossierId);
                saveDossiers();
                showDashboard();
            }
        }

        // Modal functions
        function openNewDossierModal() {
            document.getElementById('new-modal').classList.remove('hidden');
            document.getElementById('new-form').reset();
            document.getElementById('new-relation-text').textContent = '50';
        }

        function closeNewModal() {
            document.getElementById('new-modal').classList.add('hidden');
        }

        function createDossier(event) {
            event.preventDefault();

            const newDossier = {
                id: Date.now().toString(),
                name: document.getElementById('new-name').value,
                number: document.getElementById('new-number').value || '???',
                codename: document.getElementById('new-codename').value || 'нет',
                status: document.getElementById('new-status').value,
                relation: parseInt(document.getElementById('new-relation').value),
                avatar: document.getElementById('new-avatar').value || '',
                algorithm: document.getElementById('new-algorithm').value || '',
                concerns: [],
                notes: '',
                created: new Date().toLocaleString('ru-RU'),
                updated: new Date().toLocaleString('ru-RU')
            };

            dossiers.push(newDossier);
            saveDossiers();
            closeNewModal();
            showDossier(newDossier.id);
        }

        // Range slider text update
        document.getElementById('new-relation')?.addEventListener('input', function() {
            document.getElementById('new-relation-text').textContent = this.value;
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadDossiers();
            renderDashboard();
        });
    </script>
</body>
</html>
